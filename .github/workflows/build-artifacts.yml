name: Build Local Package Release

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build local unpacked folder
        run: npm run prepare:local

      - name: Pack local-unpacked zip
        shell: pwsh
        run: Compress-Archive -Path "load-unpacked/*" -DestinationPath "load-unpacked.zip" -CompressionLevel Optimal

      - name: Publish/Update GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-unpacked
          name: Latest Local Unpacked Build
          body: |
            Download `load-unpacked.zip`, extract it, and load the folder in `chrome://extensions` using **Load unpacked**.
          allowUpdates: true
          prerelease: true
          replacesArtifacts: true
          artifacts: load-unpacked.zip
